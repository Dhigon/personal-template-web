<body id="mainBody" class="bg-zinc-950 text-white min-h-screen flex flex-col items-center p-6 font-sans">

    <script>
        /* Configuration Section */
        const TMDB_KEY = '016c19fa578a651dfbd937a4a5fc8323';

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-4xl py-10">

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 w-full mb-12">

            </a>
            <a href="http://plex.tarankurtz.com:32400" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-orange-500">
                <div id="plexStatus" class="absolute top-2 text-[8px] uppercase tracking-tighter text-zinc-500 italic">Checking...</div>

                <div class="text-[11px] uppercase tracking-widest font-bold">Plex</div>
            </a>
            <a href="https://youtube.com" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-red-600">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" class="brand-icon" alt="YouTube">

            </a>
            <a href="https://remotedesktop.google.com/access" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-blue-400">
                <div class="text-3xl mb-1">🖥️</div>
                <div class="text-[11px] uppercase tracking-widest font-bold">Remote</div>
            </a>
            <a href="https://NAS.tarankurtz.com:8001/" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-zinc-400">

            </a>
            <div onclick="toggleModal('requestModal')" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-emerald-500">

            </div>
        </div>

    <footer class="mt-auto py-10 w-full flex flex-col items-center gap-6 z-50">
        <button onclick="verifyAdmin()" id="adminBtn" class="text-zinc-800 text-[9px] tracking-[0.4em] uppercase hover:text-zinc-500">Admin Portal</button>
        <div id="adminControls" class="hidden flex flex-wrap justify-center gap-4 mt-2">

            <a href="https://dash.cloudflare.com/03c14d743f0edb4784c1a97f7214f300/home/overview" target="_blank" class="text-orange-600/60 text-[8px] tracking-[0.2em] uppercase hover:text-orange-400 underline">CloudFlare</a>
        </div>
    </footer>

    <div id="requestModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl relative modal-fixed-height shadow-2xl">
            <button onclick="toggleModal('requestModal')" class="absolute top-4 right-4 text-zinc-500">✕</button>
            <h2 class="text-xl font-semibold mb-6 text-center text-emerald-400 uppercase tracking-widest">Media Request</h2>
            <input type="text" id="movieSearch" placeholder="Search Title (Year)..." class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-3 px-4 text-white outline-none">
            <div id="results" class="mt-4 bg-zinc-800 border border-zinc-700 rounded-xl hidden overflow-y-auto"></div>
        </div>
    </div>

    <script>
        /* Predictive Request Search Logic (With Year + Media Type Suffix) */
        document.getElementById('movieSearch').addEventListener('input', async (e) => {
            const val = e.target.value; 
            if (val.length < 3) { document.getElementById('results').classList.add('hidden'); return; }
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(val)}`);
            const data = await res.json();
            const results = document.getElementById('results'); 
            results.innerHTML = ''; results.classList.remove('hidden');
            
            data.results.slice(0, 6).forEach(item => {
                const title = item.title || item.name; 
                const year = (item.release_date || item.first_air_date || '').split('-')[0] || 'N/A';
                const type = item.media_type === 'tv' ? 'TV' : 'Movie';
                const div = document.createElement('div'); 
                div.className = 'p-3 hover:bg-zinc-700 cursor-pointer border-b border-zinc-700 text-xs flex justify-between';
                div.innerHTML = `<span><b>${title}</b> (${year})</span> <span class="text-zinc-500"> - ${type}</span>`;
                results.appendChild(div);
            });
        });

        function toggleModal(id) { const m = document.getElementById(id); m.classList.toggle('hidden'); m.classList.toggle('flex'); }
        function verifyAdmin() { if(prompt("Admin Code:") === ADMIN_PASS) document.getElementById('adminControls').classList.remove('hidden'); }
    </script>
</body>
</html>
