<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taran's Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <h1 class="text-4xl font-light tracking-widest mb-10">TARAN KURTZ</h1>

    <div class="w-full max-w-xl mb-12">
        <form action="https://google.com/search" method="get" class="relative">
            <input type="text" name="q" placeholder="Search Google or AI..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-full py-4 px-6 text-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-center">
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-3xl mb-12">
        <a href="http://transfer.tarankurtz.com" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-blue-500 transition-all">
            <div class="text-3xl mb-2">📂</div>
            <div class="text-sm font-medium group-hover:text-blue-400">Files</div>
        </a>

        <a href="https://plex.tv" target="_blank" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-blue-500 transition-all">
            <div class="text-3xl mb-2">🎬</div>
            <div class="text-sm font-medium group-hover:text-blue-400">Plex</div>
        </a>

        <button onclick="toggleModal()" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-blue-600 transition-all">
            <div class="text-3xl mb-2">📥</div>
            <div class="text-sm font-medium group-hover:text-blue-400">Request Media</div>
        </button>
    </div>

    <div id="requestModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl relative">
            <button onclick="toggleModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-white">✕</button>
            
            <h2 class="text-xl font-semibold mb-6 text-center text-blue-400">Media Request</h2>
            
            <form action="https://formspree.io/f/your_form_id" method="POST" class="space-y-4">
                <input type="hidden" name="_subject" value="New Media Request from Portal">
                
                <div>
                    <input type="text" name="name" placeholder="Your Name" required
                        class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-3 px-4 focus:outline-none focus:border-blue-500">
                </div>

                <div class="relative">
                    <input type="text" id="movieSearch" name="media_title" placeholder="Search Movie or TV Show..." autocomplete="off" required
                        class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-3 px-4 focus:outline-none focus:border-blue-500">
                    <div id="results" class="absolute w-full mt-2 bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden hidden z-50"></div>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-blue-900/20">
                    Submit Request
                </button>
            </form>
        </div>
    </div>

    <footer class="mt-20 text-zinc-600 text-xs tracking-widest uppercase">
        Private Server &copy; 2026 | 107.220.202.150
    </footer>

    <script>
        // TOGGLE MODAL VISIBILITY
        function toggleModal() {
            const modal = document.getElementById('requestModal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        // PREDICTIVE SEARCH LOGIC (TMDB API)
        const api_key = 'YOUR_TMDB_API_KEY_HERE'; // Get one at themoviedb.org
        const searchInput = document.getElementById('movieSearch');
        const resultsDiv = document.getElementById('results');

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length < 3) {
                resultsDiv.classList.add('hidden');
                return;
            }

            // Search both Movies and TV Shows
            const response = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${api_key}&query=${query}`);
            const data = await response.json();

            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');

            data.results.slice(0, 5).forEach(item => {
                const title = item.title || item.name;
                const year = (item.release_date || item.first_air_date || '').split('-')[0];
                if (!title) return;

                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-zinc-700 cursor-pointer border-b border-zinc-700 last:border-0';
                div.innerHTML = `<span class="font-bold">${title}</span> <span class="text-zinc-400 text-sm">(${year})</span>`;
                div.onclick = () => {
                    searchInput.value = `${title} (${year})`;
                    resultsDiv.classList.add('hidden');
                };
                resultsDiv.appendChild(div);
            });
        });

        // Close dropdown if clicking outside
        document.addEventListener('click', (e) => {
            if (!resultsDiv.contains(e.target) && e.target !== searchInput) {
                resultsDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
