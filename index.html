<!-- Enhanced Media Request Box -->
<div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl relative">
    <h2 class="text-xl font-semibold mb-6 text-center text-blue-400">🎬 Search & Request</h2>
    
    <div class="space-y-4 relative">
        <input type="text" id="movieSearch" placeholder="Start typing a movie or show..." 
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-3 px-4 focus:outline-none focus:border-blue-500">
        
        <!-- This is where the results will pop up -->
        <div id="resultsList" class="absolute left-0 right-0 mt-1 bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden hidden z-50 max-h-60 overflow-y-auto shadow-2xl"></div>

        <input type="hidden" id="selectedTitle">
        <button id="submitRequest" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors">
            Submit Request
        </button>
    </div>
</div>

<script>
    const API_KEY = 'YOUR_TMDB_ACCESS_TOKEN_HERE';
    const searchInput = document.getElementById('movieSearch');
    const resultsList = document.getElementById('resultsList');

    searchInput.addEventListener('input', async (e) => {
        const query = e.target.value;
        if (query.length < 3) { resultsList.classList.add('hidden'); return; }

        const response = await fetch(`https://themoviedb.org{query}&include_adult=false&api_key=${API_KEY}`);
        const data = await response.json();

        resultsList.innerHTML = '';
        resultsList.classList.remove('hidden');

        data.results.slice(0, 5).forEach(item => {
            const div = document.createElement('div');
            const name = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').substring(0, 4);
            
            div.className = "p-3 hover:bg-zinc-700 cursor-pointer border-b border-zinc-700 flex items-center space-x-3";
            div.innerHTML = `
                <img src="https://tmdb.org{item.poster_path}" class="w-10 rounded" onerror="this.src='https://placeholder.com'">
                <div>
                    <div class="text-sm font-bold">${name}</div>
                    <div class="text-xs text-zinc-400">${item.media_type.toUpperCase()} • ${year}</div>
                </div>
            `;
            div.onclick = () => {
                searchInput.value = `${name} (${year})`;
                resultsList.classList.add('hidden');
            };
            resultsList.appendChild(div);
        });
    });

    // Close results if clicking outside
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target)) resultsList.classList.add('hidden');
    });
</script>
