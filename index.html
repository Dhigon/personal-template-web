<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taran's Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        
        #mainBody { 
            background-image: url('https://transfer.tarankurtz.com:8443/KurtzHome610/assets%20(website)/images/background-1.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; background-color: #09090b;
        }

        .dashboard-card { height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; cursor: pointer; transition: all 0.2s ease; z-index: 20; text-decoration: none; }
        .modal-fixed-height { height: 520px; display: flex; flex-direction: column; }
    </style>
</head>
<body id="mainBody" class="bg-zinc-950 text-white min-h-screen flex flex-col items-center p-6 font-sans">

    <script>
        /* Configuration */
        const TMDB_KEY = '016c19fa578a651dfbd937a4a5fc8323';
        const ADMIN_PASS = 'Potatoes2!'; 
    </script>

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-4xl py-10">
        <h1 id="editableTitle" class="text-3xl font-light tracking-widest mb-10 text-center uppercase">Taran's Portal</h1>

        <div class="w-full max-w-2xl mb-12">
            <div class="flex items-center bg-zinc-900/80 backdrop-blur-md border border-zinc-800 rounded-full px-2 py-2 shadow-xl">
                <input type="text" id="mainSearch" onkeydown="if(event.key==='Enter') window.location.href='https://google.com/search?q='+encodeURIComponent(this.value)" placeholder="Search..." class="flex-1 py-2 px-6 text-base bg-transparent outline-none">
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 w-full mb-12">
            <a href="https://transfer.tarankurtz.com:8443" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-blue-500">
                <div class="text-3xl mb-1">📂</div>
                <div class="text-[11px] uppercase tracking-widest font-bold">Files</div>
            </a>
            <a href="http://plex.tarankurtz.com:32400" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-orange-500">
                <div class="text-3xl mb-1">🎬</div>
                <div class="text-[11px] uppercase tracking-widest font-bold">Plex</div>
            </a>
            <div onclick="toggleModal('requestModal')" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-emerald-500">
                <div class="text-3xl mb-1">📥</div>
                <div class="text-[11px] uppercase tracking-widest font-bold">Request</div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-10 w-full flex flex-col items-center gap-6 z-50">
        <button onclick="verifyAdmin()" id="adminBtn" class="text-zinc-800 text-[9px] tracking-[0.4em] uppercase hover:text-zinc-500">Admin Portal</button>
        <div id="adminControls" class="hidden flex flex-wrap justify-center gap-4 mt-2">
            <a href="https://github.com/Dhigon/personal-template-web/blob/main/index.html" target="_blank" class="text-emerald-600/60 text-[8px] tracking-[0.2em] uppercase hover:text-emerald-400 underline">Code</a>
            <a href="http://192.168.1.254" target="_blank" class="text-blue-600/60 text-[8px] tracking-[0.2em] uppercase hover:text-blue-400 underline">Router</a>
            <a href="https://dash.cloudflare.com/03c14d743f0edb4784c1a97f7214f300/home/overview" target="_blank" class="text-orange-600/60 text-[8px] tracking-[0.2em] uppercase hover:text-orange-400 underline">CloudFlare</a>
        </div>
    </footer>

    <div id="requestModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl relative modal-fixed-height">
            <button onclick="toggleModal('requestModal')" class="absolute top-4 right-4 text-zinc-500">✕</button>
            <input type="text" id="movieSearch" placeholder="Search Title (Year)..." class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-3 px-4 text-white outline-none">
            <div id="results" class="mt-4 bg-zinc-800 border border-zinc-700 rounded-xl hidden overflow-y-auto"></div>
        </div>
    </div>

    <script>
        /* Predictive Search Logic: Formatted with Year and Type Suffix */
        document.getElementById('movieSearch').addEventListener('input', async (e) => {
            const val = e.target.value; 
            if (val.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(val)}`);
            const data = await res.json();
            const results = document.getElementById('results'); 
            results.innerHTML = ''; results.classList.remove('hidden');
            
            data.results.slice(0, 6).forEach(item => {
                const title = item.title || item.name; 
                const year = (item.release_date || item.first_air_date || '').split('-')[0] || 'N/A';
                const type = item.media_type === 'tv' ? 'TV' : 'Movie';
                
                const div = document.createElement('div'); 
                div.className = 'p-3 hover:bg-zinc-700 cursor-pointer text-xs flex justify-between border-b border-zinc-700';
                div.innerHTML = `<span><b>${title}</b> (${year})</span> <span class="text-zinc-500"> - ${type}</span>`;
                results.appendChild(div);
            });
        });

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); document.getElementById(id).classList.toggle('flex'); }
        function verifyAdmin() { if(prompt("Admin Code:") === ADMIN_PASS) document.getElementById('adminControls').classList.remove('hidden'); }
    </script>
</body>
</html>
