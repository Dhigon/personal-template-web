<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taran Kurtz | Home</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .search-container { width: 90%; max-width: 600px; margin-bottom: 50px; }
        input[type="text"] { width: 100%; padding: 18px; border-radius: 30px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 18px; outline: none; text-align: center; }
        input[type="text"]:focus { border-color: #00b4ff; box-shadow: 0 0 10px #00b4ff; }
        .links { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; width: 90%; max-width: 700px; }
        .card { background: #1a1a1a; padding: 25px; text-align: center; border-radius: 15px; text-decoration: none; color: white; font-weight: 500; border: 1px solid #333; transition: 0.3s; }
        .card:hover { background: #252525; transform: translateY(-5px); border-color: #00b4ff; }
        h1 { font-weight: 200; letter-spacing: 2px; margin-bottom: 40px; }
    </style>
</head>
<body>

    <h1>TARAN KURTZ</h1>

    <div class="search-container">
        <!-- Search Bar: Just type and hit enter for Google -->
        <form action="https://google.com" method="get">
            <input type="text" name="q" placeholder="Search Google or AI..." autofocus autocomplete="off">
        </form>
    </div>

    <div class="links">
        <!-- Your Home Server Links -->

    </div>

</body>
